<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f7f6; }
        .panel { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; }
        .btn { padding: 15px; margin-top: 10px; width: 100%; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .card { background: white; padding: 12px; margin: 8px 0; border-radius: 8px; border-left: 5px solid #3498db; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); padding: 20px; z-index: 1000; overflow-y: auto; }
        input { width: 100%; padding: 12px; margin: 5px 0; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="panel">
    <button class="btn" style="background:#e67e22" onclick="startScanner()">📷 Escanear y Editar</button>
    <div id="reader" style="width: 100%; display:none;"></div>
    <button class="btn" style="background:#27ae60" onclick="sync()">🔄 Sincronizar</button>
</div>
<div id="grid"></div>

<div id="modal" class="modal">
    <div style="background:white; padding:20px; border-radius:10px;">
        <h3>Gestionar Registro</h3>
        <input type="hidden" id="idx" value="nuevo">
        <input id="eR" placeholder="Rack"><input id="eP" placeholder="Posición"><input id="eN" placeholder="Nivel">
        <input id="eS" placeholder="SKU"><input id="eL" placeholder="LPN"><input type="date" id="eVen">
        <input id="ePatio" placeholder="Patio"><input id="ePiso" placeholder="Piso"><input id="ePasillo" placeholder="Pasillo">
        <button class="btn" style="background:#3498db" onclick="guardar()">Guardar</button>
        <button class="btn" style="background:#e74c3c" onclick="cancelar()">Cancelar</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxqJXfTanClcNpM9zCgsuL2AKQKmBa5QXIILNyVySVLzM9s2DFBnqtcc9xuD7IKhoen/exec"; 
    let data = [];
    
    async function sync() { 
        let res = await fetch(URL);
        data = await res.json(); 
        let g = document.getElementById('grid'); g.innerHTML = '';
        for(let i=1; i<data.length; i++) g.innerHTML += `<div class="card" onclick="edit(${i})"><strong>Ubicación: ${data[i][0] || data[i][6]}</strong><br>SKU: ${data[i][3]} | LPN: ${data[i][4]}</div>`;
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        let h = new Html5Qrcode("reader");
        h.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            h.stop(); document.getElementById('reader').style.display = 'none';
            let index = data.findIndex(row => row[4] == text);
            if (index !== -1) {
                if(confirm("El LPN " + text + " ya existe. ¿Desea editarlo?")) edit(index);
            } else {
                document.getElementById('idx').value = "nuevo";
                document.getElementById('eL').value = text;
                document.getElementById('modal').style.display = 'block';
            }
        });
    }

    async function guardar() {
        let i = document.getElementById('idx').value;
        let fila = [document.getElementById('eR').value, document.getElementById('eP').value, document.getElementById('eN').value, document.getElementById('eS').value, document.getElementById('eL').value, document.getElementById('eVen').value, document.getElementById('ePatio').value, document.getElementById('ePiso').value, document.getElementById('ePasillo').value];
        if (i === "nuevo") data.push(fila); else data[parseInt(i)] = fila;

        let res = await fetch(URL, { method: 'POST', body: JSON.stringify({ datos: data.slice(1), fila: fila }) });
        let msg = await res.text();
        if(msg === "SUCCESS") { alert("¡Guardado correctamente!"); document.getElementById('modal').style.display = 'none'; sync(); }
        else { alert("Error: " + msg); }
    }

    function edit(i) {
        document.getElementById('idx').value = i;
        document.getElementById('eR').value = data[i][0]; document.getElementById('eP').value = data[i][1]; document.getElementById('eN').value = data[i][2]; 
        document.getElementById('eS').value = data[i][3]; document.getElementById('eL').value = data[i][4]; document.getElementById('eVen').value = data[i][5];
        document.getElementById('ePatio').value = data[i][6]; document.getElementById('ePiso').value = data[i][7]; document.getElementById('ePasillo').value = data[i][8];
        document.getElementById('modal').style.display = 'block';
    }

    function cancelar() { document.getElementById('modal').style.display = 'none'; }
    window.onload = sync;
</script>
</body>
</html>
