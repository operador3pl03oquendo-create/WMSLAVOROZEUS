<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Pro - Operativo</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .panel { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .card { background: white; padding: 12px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="panel">
    <h3>WMS Pro</h3>
    <input type="text" id="filtro" placeholder="Filtrar SKU..." onkeyup="render()">
    <button onclick="sync()">Sincronizar</button>
</div>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Editar Ubicación</h3>
        <input type="hidden" id="idx">
        Rack:<input type="number" id="eR">
        Pos:<input type="number" id="eP">
        Niv:<input type="number" id="eN">
        SKU:<input type="text" id="eS">
        LPN:<input type="text" id="eL">
        <button onclick="save()">Guardar Cambios</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="background:#95a5a6; margin-top:5px;">Cancelar</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxqJXfTanClcNpM9zCgsuL2AKQKmBa5QXIILNyVySVLzM9s2DFBnqtcc9xuD7IKhoen/exec";
    let data = [];

    async function sync() {
        const r = await fetch(URL);
        data = await r.json();
        render();
    }
    function render() {
        const b = document.getElementById('filtro').value.toLowerCase();
        const g = document.getElementById('grid');
        g.innerHTML = '';
        for(let i=1; i<data.length; i++) {
            if(data[i].join(' ').toLowerCase().includes(b)) {
                g.innerHTML += `<div class="card" onclick="edit(${i})">
                    <strong>R${data[i][0]}-P${data[i][1]}-N${data[i][2]}</strong><br>
                    SKU: ${data[i][3]}<br>LPN: ${data[i][4]}</div>`;
            }
        }
    }
    function edit(i) {
        document.getElementById('idx').value = i;
        document.getElementById('eR').value = data[i][0];
        document.getElementById('eP').value = data[i][1];
        document.getElementById('eN').value = data[i][2];
        document.getElementById('eS').value = data[i][3];
        document.getElementById('eL').value = data[i][4];
        document.getElementById('modal').style.display = 'block';
    }
    async function save() {
        let i = document.getElementById('idx').value;
        let ubiAnt = `P${data[i][1]}-N${data[i][2]}`;
        
        data[i] = [document.getElementById('eR').value, document.getElementById('eP').value, document.getElementById('eN').value, document.getElementById('eS').value, document.getElementById('eL').value, data[i][5]];
        let ubiNue = `P${data[i][1]}-N${data[i][2]}`;
        
        await fetch(URL, { method:'POST', body: JSON.stringify({
            datos: data,
            movimiento: { rack: data[i][0], ubiAnt: ubiAnt, ubiNue: ubiNue, sku: data[i][3], lpn: data[i][4] }
        })});
        document.getElementById('modal').style.display = 'none';
        sync();
        alert("Cambio registrado correctamente.");
    }
    sync();
</script>
</body>
</html>
