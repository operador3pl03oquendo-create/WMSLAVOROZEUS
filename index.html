<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 10px; }
        .panel { background: #2c3e50; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .btn-scan { background: #e67e22; border: none; padding: 15px; color: white; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-sync { background: #27ae60; border: none; padding: 15px; color: white; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .search-box { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); padding: 20px; z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-g { background: #3498db; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-c { background: #e74c3c; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>WMS Pro</h2>
    <button class="btn-scan" onclick="startScanner()">📷 Escanear Código</button>
    <div id="reader" style="display:none; width: 100%;"></div>
    <button class="btn-sync" onclick="sync()">🔄 Sincronizar</button>
    <input type="text" id="search" class="search-box" placeholder="🔍 Buscar (Rack, SKU, LPN)..." onkeyup="filterData()">
</div>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Editar Ubicación</h3>
        <input type="hidden" id="idx">
        <label>Tipo:</label>
        <select id="tipoUbi" onchange="toggleUbi()">
            <option value="Rack">Rack</option>
            <option value="Temporal">Temporal</option>
        </select>
        <div id="divRack">
            Rack:<input type="number" id="eR"> Pos:<input type="number" id="eP"> Niv:<input type="number" id="eN">
        </div>
        <div id="divTemp" style="display:none;">
            Patio:<input type="text" id="ePatio"> Piso:<input type="text" id="ePiso"> Pasillo:<input type="text" id="ePasillo">
        </div>
        SKU:<input type="text" id="eS"> LPN:<input type="text" id="eL">
        Vencimiento:<input type="date" id="eVen">
        <button class="btn-g" onclick="save()">Guardar</button>
        <button class="btn-c" onclick="cancelar()">Cancelar</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxqJXfTanClcNpM9zCgsuL2AKQKmBa5QXIILNyVySVLzM9s2DFBnqtcc9xuD7IKhoen/exec"; 
    let data = [];

    async function sync() {
        const r = await fetch(URL);
        data = await r.json();
        render(data);
    }

    function render(items) {
        const g = document.getElementById('grid');
        g.innerHTML = '';
        for(let i=1; i < items.length; i++) {
            let ubi = items[i][0] ? `Rack: ${items[i][0]}` : `Patio: ${items[i][6]}`;
            g.innerHTML += `
                <div class="card" onclick="edit(${i})">
                    <strong>${ubi}</strong><br>
                    SKU: ${items[i][3]}<br>
                    LPN: ${items[i][4]}<br>
                    <small>Pos: ${items[i][1] || '-'} | Niv: ${items[i][2] || '-'}</small>
                </div>`;
        }
    }

    function filterData() {
        let q = document.getElementById('search').value.toLowerCase();
        let filtered = data.filter((item, index) => {
            if(index === 0) return true;
            return item.join(' ').toLowerCase().includes(q);
        });
        render(filtered);
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }).render((data) => {
            document.getElementById('search').value = data;
            filterData();
            document.getElementById('reader').style.display = 'none';
        });
    }

    function toggleUbi() {
        let t = document.getElementById('tipoUbi').value;
        document.getElementById('divRack').style.display = t === 'Rack' ? 'block' : 'none';
        document.getElementById('divTemp').style.display = t === 'Temporal' ? 'block' : 'none';
    }

    function edit(i) {
        document.getElementById('idx').value = i;
        document.getElementById('eR').value = data[i][0] || "";
        document.getElementById('eP').value = data[i][1] || "";
        document.getElementById('eN').value = data[i][2] || "";
        document.getElementById('eS').value = data[i][3] || "";
        document.getElementById('eL').value = data[i][4] || "";
        document.getElementById('eVen').value = data[i][5] || "";
        document.getElementById('ePatio').value = data[i][6] || "";
        document.getElementById('ePiso').value = data[i][7] || "";
        document.getElementById('ePasillo').value = data[i][8] || "";
        document.getElementById('tipoUbi').value = data[i][0] ? "Rack" : "Temporal";
        toggleUbi();
        document.getElementById('modal').style.display = 'block';
    }

    function cancelar() { document.getElementById('modal').style.display = 'none'; }

    async function save() {
        let i = parseInt(document.getElementById('idx').value);
        data[i] = [document.getElementById('eR').value, document.getElementById('eP').value, document.getElementById('eN').value, document.getElementById('eS').value, document.getElementById('eL').value, document.getElementById('eVen').value, document.getElementById('ePatio').value, document.getElementById('ePiso').value, document.getElementById('ePasillo').value];
        await fetch(URL, { method: 'POST', body: JSON.stringify({ datos: data.slice(1) }) });
        alert("Guardado correctamente");
        document.getElementById('modal').style.display = 'none';
        sync();
    }
</script>
</body>
</html>
