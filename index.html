<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #eee; }
        .btn { padding: 15px; width: 100%; border: none; border-radius: 8px; color: white; margin: 5px 0; font-weight: bold; }
        #reader { width: 100%; display: none; }
    </style>
</head>
<body>
    <div id="status" style="background:#2c3e50; color:white; padding:10px; text-align:center;">Cargando...</div>
    <button class="btn" style="background:#e67e22" onclick="scanner('ingreso')">📷 Ingreso</button>
    <button class="btn" style="background:#c0392b" onclick="scanner('salida')">📦 Despachar</button>
    <button class="btn" style="background:#27ae60" onclick="sync()">🔄 Sincronizar</button>
    <div id="reader"></div>
    <div id="grid"></div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxqJXfTanClcNpM9zCgsuL2AKQKmBa5QXIILNyVySVLzM9s2DFBnqtcc9xuD7IKhoen/exec"; // 
        let data = [];

        async function sync() {
            document.getElementById('status').innerText = "Cargando...";
            try {
                let res = await fetch(URL);
                let json = await res.json();
                data = json.inventario;
                document.getElementById('status').innerText = `Items: ${data.length-1}`;
                render();
            } catch(e) { document.getElementById('status').innerText = "Error al conectar"; }
        }

        function render() {
            let g = document.getElementById('grid'); g.innerHTML = '';
            data.slice(1).forEach(r => {
                if(r[4]) g.innerHTML += `<div style="background:white; padding:10px; margin:5px; border-radius:5px;">
                    <strong>LPN: ${r[4]}</strong><br>SKU: ${r[3]}<br>Ubicación: ${r[6]}</div>`;
            });
        }

        function scanner(modo) {
            document.getElementById('reader').style.display = 'block';
            const html5Qrcode = new Html5Qrcode("reader");
            html5Qrcode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, 
                async (decodedText) => {
                    html5Qrcode.stop();
                    document.getElementById('reader').style.display = 'none';
                    if(modo === 'salida') {
                        await fetch(URL, { method: 'POST', body: JSON.stringify({ accion: 'SALIDA', lpn: decodedText }) });
                    } else {
                        // Aquí simplifiqué, en tu caso abriría el modal
                        alert("LPN escaneado: " + decodedText);
                    }
                    sync();
                });
        }
        window.onload = sync;
    </script>
</body>
</html>
