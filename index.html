<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Profesional Centralizado</title>
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; }
        .controls { background: white; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .pos { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; cursor: pointer; transition: 0.3s; }
        .pos:hover { background: #e9ecef; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 80%; max-width: 400px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="cargarDatos()" style="background:#28a745; color:white;">🔄 Sincronizar Datos</button>
    <input type="text" id="searchInput" placeholder="🔍 Filtrar por SKU o LPN..." onkeyup="render()">
    <button onclick="alert('Función de cámara lista para móvil')">📷 Escanear LPN</button>
</div>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Editar Posición</h3>
        <input type="hidden" id="editIdx">
        SKU: <input type="text" id="editSKU">
        LPN: <input type="text" id="editLPN">
        <button onclick="guardarCambios()" style="background:var(--primary); color:white;">Guardar Cambios</button>
        <button onclick="document.getElementById('modal').style.display='none'">Cancelar</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVHzGceuCsqJ-R8hAbO1fjaKyNyWgIA6p4zU7GhPjHjNJUuw_-3cunChykown5HP16Tg/exec";
    let data = [];

    async function cargarDatos() {
        const resp = await fetch(SCRIPT_URL);
        data = await resp.json();
        render();
    }

    function render() {
        const filter = document.getElementById('searchInput').value.toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for(let i=1; i<data.length; i++) {
            if(data[i][3].toString().toLowerCase().includes(filter) || data[i][4].toString().toLowerCase().includes(filter)) {
                grid.innerHTML += `<div class="pos" onclick="abrirModal(${i})">
                    <strong>R${data[i][0]}-P${data[i][1]}-N${data[i][2]}</strong><br>
                    SKU: ${data[i][3]}<br>LPN: ${data[i][4]}</div>`;
            }
        }
    }

    function abrirModal(i) {
        document.getElementById('editIdx').value = i;
        document.getElementById('editSKU').value = data[i][3];
        document.getElementById('editLPN').value = data[i][4];
        document.getElementById('modal').style.display = 'flex';
    }

    async function guardarCambios() {
        let i = document.getElementById('editIdx').value;
        data[i][3] = document.getElementById('editSKU').value;
        data[i][4] = document.getElementById('editLPN').value;
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
        document.getElementById('modal').style.display = 'none';
        render();
    }
    
    cargarDatos();
</script>
</body>
</html>
