<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f8f9fa; }
        .btn { padding: 15px; margin: 5px 0; width: 100%; border: none; border-radius: 8px; color: white; font-weight: bold; }
        .card { background: white; padding: 15px; margin: 8px 0; border-radius: 8px; border-left: 8px solid #3498db; }
        .modal { display: none; position: fixed; inset: 0; background: white; padding: 20px; z-index: 1000; overflow-y: auto; }
        #reader { width: 100%; height: 300px; display: none; background: black; }
        .close-btn { background: red; color: white; padding: 10px; width: 100%; border: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="resumen" style="background:#2c3e50; color:white; padding:15px; text-align:center;">Cargando...</div>
    <div id="reader"></div>
    <button id="closeCam" class="close-btn" style="display:none;" onclick="stopScanner()">Cerrar Cámara</button>

    <button class="btn" style="background:#e67e22" onclick="startScanner('ingreso')">📷 Ingreso</button>
    <button class="btn" style="background:#c0392b" onclick="startScanner('salida')">📦 Despachar</button>
    <input type="text" id="busqueda" placeholder="🔍 Buscar SKU o LPN..." onkeyup="filtrar()" style="width:100%; padding:12px; margin:10px 0;">
    <div id="grid"></div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxqJXfTanClcNpM9zCgsuL2AKQKmBa5QXIILNyVySVLzM9s2DFBnqtcc9xuD7IKhoen/exec"; 
        let data = [];
        let html5Qrcode;

        async function sync() {
            let res = await fetch(URL);
            let json = await res.json();
            data = json.inventario;
            document.getElementById('resumen').innerText = `Total registros: ${data.length-1}`;
            render(data);
        }

        function render(items) {
            let g = document.getElementById('grid'); g.innerHTML = '';
            // OPTIMIZACIÓN: Solo renderizamos primeros 50 para que no colapse el móvil
            items.slice(1, 51).forEach((r, i) => {
                if(r[4]) g.innerHTML += `<div class="card" onclick="edit(${items.indexOf(r)})"><strong>LPN: ${r[4]}</strong><br>SKU: ${r[3]}<br>Loc: ${r[6]}</div>`;
            });
        }

        function startScanner(modo) {
            document.getElementById('reader').style.display = 'block';
            document.getElementById('closeCam').style.display = 'block';
            html5Qrcode = new Html5Qrcode("reader");
            html5Qrcode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (t) => {
                stopScanner();
                if(modo === 'salida') {
                    let idx = data.findIndex(r => r[4] == t);
                    if(idx !== -1) { await fetch(URL, { method: 'POST', body: JSON.stringify({ accion: 'SALIDA', fila: data[idx] }) }); sync(); }
                } else { alert("Escaneado: " + t); }
            });
        }

        function stopScanner() {
            if(html5Qrcode) html5Qrcode.stop();
            document.getElementById('reader').style.display = 'none';
            document.getElementById('closeCam').style.display = 'none';
        }

        function filtrar() {
            let q = document.getElementById('busqueda').value.toLowerCase();
            render(data.filter((r, i) => i == 0 || (r[3] && r[3].toString().toLowerCase().includes(q)) || (r[4] && r[4].toString().toLowerCase().includes(q))));
        }
        window.onload = sync;
    </script>
</body>
</html>
