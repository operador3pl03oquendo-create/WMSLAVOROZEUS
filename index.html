<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WMS Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .panel { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { padding: 15px; margin-top: 10px; width: 100%; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
    </style>
</head>
<body>

<div class="panel">
    <button class="btn" style="background:#e67e22" onclick="startScanner()">📷 Escanear y Editar</button>
    <div id="reader" style="display:none; width: 100%;"></div>
    <button class="btn" style="background:#27ae60" onclick="sync()">🔄 Sincronizar</button>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Gestionar Registro</h3>
        <input type="hidden" id="idx">
        <select id="tipoUbi"><option>Rack</option><option>Temporal</option></select>
        <input type="text" id="eR" placeholder="Rack">
        <input type="text" id="eP" placeholder="Posición">
        <input type="text" id="eN" placeholder="Nivel">
        <input type="text" id="eS" placeholder="SKU">
        <input type="text" id="eL" placeholder="LPN">
        <input type="date" id="eVen">
        <button class="btn" style="background:#3498db" onclick="save()">Guardar</button>
        <button class="btn" style="background:#e74c3c" onclick="cancelar()">Cancelar</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxqJXfTanClcNpM9zCgsuL2AKQKmBa5QXIILNyVySVLzM9s2DFBnqtcc9xuD7IKhoen/exec"; 
    let data = [];
    let html5QrCode;

    async function sync() {
        const r = await fetch(URL);
        data = await r.json();
        alert("Sincronizado");
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            html5QrCode.stop();
            document.getElementById('reader').style.display = 'none';
            let i = data.findIndex(r => r[4] == text);
            if(i !== -1) edit(i);
            else {
                document.getElementById('idx').value = "nuevo";
                document.getElementById('eL').value = text;
                document.getElementById('modal').style.display = 'block';
            }
        });
    }

    function edit(i) {
        document.getElementById('idx').value = i;
        document.getElementById('eR').value = data[i][0];
        document.getElementById('eP').value = data[i][1];
        document.getElementById('eN').value = data[i][2];
        document.getElementById('eS').value = data[i][3];
        document.getElementById('eL').value = data[i][4];
        document.getElementById('eVen').value = data[i][5];
        document.getElementById('modal').style.display = 'block';
    }

    function cancelar() { document.getElementById('modal').style.display = 'none'; }

    async function save() {
        let i = document.getElementById('idx').value;
        let fila = [document.getElementById('eR').value, document.getElementById('eP').value, document.getElementById('eN').value, document.getElementById('eS').value, document.getElementById('eL').value, document.getElementById('eVen').value];
        
        if (i === "nuevo") data.push(fila);
        else data[parseInt(i)] = fila;

        await fetch(URL, { 
            method: 'POST', 
            body: JSON.stringify({ datos: data.slice(1), fila: fila }) 
        });
        alert("Guardado");
        document.getElementById('modal').style.display = 'none';
    }
</script>
</body>
</html>
