<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WMS Pro - Operativo</title>
    <style>
        body { font-family: sans-serif; background: #eef; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #aaa; cursor: pointer; }
    </style>
</head>
<body>
    <h3>WMS Operaciones</h3>
    <input type="text" id="filtro" placeholder="Buscar..." onkeyup="renderizar()">
    <button onclick="cargar()">Sincronizar</button>
    <div id="grid" class="grid" style="margin-top:20px;"></div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxqJXfTanClcNpM9zCgsuL2AKQKmBa5QXIILNyVySVLzM9s2DFBnqtcc9xuD7IKhoen/exec";
    let inv = [];

    async function cargar() {
        try {
            const r = await fetch(URL);
            inv = await r.json();
            renderizar();
        } catch(e) { alert("Error al conectar: " + e); }
    }

    function renderizar() {
        const b = document.getElementById('filtro').value.toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        // Empezamos en 1 para saltar los encabezados
        for(let i=1; i<inv.length; i++) {
            let fila = inv[i];
            if(fila.join(' ').toLowerCase().includes(b)) {
                grid.innerHTML += `<div class="card">
                    <strong>R${fila[0]}-P${fila[1]}-N${fila[2]}</strong><br>
                    SKU: ${fila[3]}<br>LPN: ${fila[4]}
                </div>`;
            }
        }
    }
    cargar();
</script>
</body>
</html>
