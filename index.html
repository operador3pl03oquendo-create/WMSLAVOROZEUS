<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WMS Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f7f6; }
        .dashboard { background: #34495e; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        .panel { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; }
        .btn { padding: 15px; margin: 5px 0; width: 100%; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .card { background: white; padding: 15px; margin: 8px 0; border-radius: 8px; border-left: 5px solid #3498db; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); padding: 20px; z-index: 1000; }
        input { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="resumen" class="dashboard">Conectando...</div>
<div class="panel">
    <button class="btn" style="background:#e67e22" onclick="startScanner()">📷 Ingreso</button>
    <button class="btn" style="background:#c0392b" onclick="escanearSalida()">📦 Despachar</button>
    <div id="reader" style="width: 100%; display:none;"></div>
    <button class="btn" style="background:#27ae60" onclick="sync()">🔄 Sincronizar</button>
</div>
<div id="grid"></div>

<div id="modal" class="modal">
    <div style="background:white; padding:20px; border-radius:10px;">
        <h3>Gestionar Registro</h3>
        <input type="hidden" id="idx" value="nuevo">
        <input id="eR" placeholder="Rack"><input id="eP" placeholder="Posición"><input id="eN" placeholder="Nivel">
        <input id="eS" placeholder="SKU" list="skuList"><datalist id="skuList"></datalist>
        <input id="eL" placeholder="LPN"><input type="date" id="eVen">
        <button class="btn" style="background:#3498db" onclick="guardar()">Guardar</button>
        <button class="btn" style="background:#95a5a6" onclick="cancelar()">Cancelar</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxqJXfTanClcNpM9zCgsuL2AKQKmBa5QXIILNyVySVLzM9s2DFBnqtcc9xuD7IKhoen/exec"; 
    let data = [], userName = localStorage.getItem('user') || prompt("Tu nombre:") || "Usuario";
    localStorage.setItem('user', userName);

    async function sync() {
        document.getElementById('resumen').innerText = "Sincronizando...";
        let res = await fetch(URL);
        let json = await res.json();
        data = json.inventario;
        let datalist = document.getElementById('skuList');
        datalist.innerHTML = '';
        json.skus.forEach(s => { let o = document.createElement('option'); o.value = s; datalist.appendChild(o); });
        
        let hoy = new Date();
        let vencidos = data.slice(1).filter(r => r[5] && new Date(r[5]) < hoy).length;
        document.getElementById('resumen').innerHTML = `📦 Items: ${data.length-1} | 🔴 Vencidos: ${vencidos}`;
        render(data);
    }

    function render(items) {
        let g = document.getElementById('grid'); g.innerHTML = '';
        for(let i=1; i<items.length; i++) {
            g.innerHTML += `<div class="card" onclick="edit(${i})"><strong>LPN: ${items[i][4]}</strong><br>SKU: ${items[i][3]}<br>Venc: ${items[i][5] ? items[i][5].toString().split('T')[0] : ""}</div>`;
        }
    }

    async function guardar() {
        if(!document.getElementById('eS').value) return alert("SKU obligatorio");
        let i = document.getElementById('idx').value;
        let fila = [document.getElementById('eR').value, document.getElementById('eP').value, document.getElementById('eN').value, document.getElementById('eS').value, document.getElementById('eL').value, document.getElementById('eVen').value, "", "", ""];
        if (i === "nuevo") data.push(fila); else data[parseInt(i)] = fila;
        await fetch(URL, { method: 'POST', body: JSON.stringify({ datos: data.slice(1), fila: fila, user: userName }) });
        document.getElementById('modal').style.display = 'none'; sync();
    }
    
    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        let h = new Html5Qrcode("reader");
        h.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => { h.stop(); document.getElementById('eL').value = t; document.getElementById('modal').style.display = 'block'; });
    }

    async function escanearSalida() {
        document.getElementById('reader').style.display = 'block';
        let h = new Html5Qrcode("reader");
        h.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (t) => {
            h.stop();
            let row = data.find(r => r[4] == t);
            if(row && confirm("¿Despachar LPN "+t+"?")) {
                await fetch(URL, { method: 'POST', body: JSON.stringify({ accion: "SALIDA", fila: row, user: userName }) });
                sync();
            }
        });
    }

    function edit(i) { /* ... lógica de edición ... */ document.getElementById('modal').style.display = 'block'; }
    function cancelar() { document.getElementById('modal').style.display = 'none'; }
    window.onload = sync;
</script>
</body>
</html>
